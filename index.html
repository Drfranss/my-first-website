<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Space Mission Signup</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <h1>🚀 Space Mission Signup</h1>
    <nav>
      <a href="index.html">Sign Up</a>
      <a href="roster.html">View Roster</a>
    </nav>
  </header>

  <main>
    <h2>Join the Crew</h2>
    <p>Fill out the form below to register for a space mission.</p>

    <form id="signupForm">

      <div class="form-group">
        <label for="name">Full Name *</label>
        <input type="text" id="name" placeholder="Jane Doe" />
        <span class="error" id="nameError"></span>
      </div>

      <div class="form-group">
        <label for="email">Email Address *</label>
        <input type="email" id="email" placeholder="jane@email.com" />
        <span class="error" id="emailError"></span>
      </div>

      <div class="form-group">
        <label for="role">Role *</label>
        <select id="role">
          <option value="">-- Select a Role --</option>
          <option value="Pilot">Pilot</option>
          <option value="Engineer">Engineer</option>
          <option value="Scientist">Scientist</option>
          <option value="Medic">Medic</option>
          <option value="Navigator">Navigator</option>
        </select>
        <span class="error" id="roleError"></span>
      </div>

      <div class="form-group">
        <label for="destination">Destination *</label>
        <select id="destination">
          <option value="">-- Select a Destination --</option>
          <option value="Mars">Mars</option>
          <option value="Moon">Moon</option>
          <option value="Space Station">Space Station</option>
          <option value="Europa">Europa</option>
          <option value="Titan">Titan</option>
        </select>
        <span class="error" id="destError"></span>
      </div>

      <div class="form-group">
        <label>Experience Level *</label>
        <div class="radio-group">
          <label><input type="radio" name="experience" value="Beginner" /> Beginner</label>
          <label><input type="radio" name="experience" value="Intermediate" /> Intermediate</label>
          <label><input type="radio" name="experience" value="Veteran" /> Veteran</label>
        </div>
        <span class="error" id="expError"></span>
      </div>

      <div class="form-group">
        <label for="snack">Favorite Space Snack (optional)</label>
        <input type="text" id="snack" placeholder="Freeze-dried ice cream" />
      </div>

      <div class="form-group">
        <label for="motto">Mission Motto (optional)</label>
        <textarea id="motto" rows="3" placeholder="To infinity and beyond..."></textarea>
      </div>

      <button type="submit">Register</button>

    </form>

    <p id="successMsg" class="success-msg"></p>

  </main>

  <footer>
    <p>Space Mission Signup &copy; 2025</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
